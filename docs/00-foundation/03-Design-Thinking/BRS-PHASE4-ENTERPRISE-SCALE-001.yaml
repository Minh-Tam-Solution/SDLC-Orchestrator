functional_requirements:
  # NEW FEATURES (Phase 4)

  - id: FR16
    title: "SOP Versioning System"
    priority: "MANDATORY"
    user_story: |
      As a developer, I want to create versions of my SOPs (like Git commits)
      so that I can track changes, revert mistakes, and compare versions.

    acceptance_criteria:
      - criterion: "Create new SOP version with commit message"
        test_method: "Manual test: Edit SOP → Click 'Save as Version' → Enter message"
        expected_result: "New version saved with SHA256 hash + timestamp"

      - criterion: "View version history (list of all versions)"
        test_method: "Manual test: Click 'Version History' → See list"
        expected_result: "Table showing version, author, date, message, hash"

      - criterion: "Compare 2 versions (side-by-side diff)"
        test_method: "Manual test: Select 2 versions → Click 'Compare'"
        expected_result: "Diff view (green additions, red deletions)"

      - criterion: "Revert to previous version"
        test_method: "Manual test: Select old version → Click 'Revert'"
        expected_result: "SOP content restored + new version created (revert commit)"

      - criterion: "Version storage uses <5% additional space"
        test_method: "Load test: 1000 SOPs, 10 versions each"
        expected_result: "Storage: 1000 SOPs × 10KB = 10MB, versions: <500KB (delta compression)"

    technical_details:
      implementation: |
        Database Schema:
        - `sop_versions` table (id, sop_id, version_number, content_delta,
          author_id, commit_message, created_at, sha256_hash)
        - Delta compression: Store only diffs (not full content) using
          diff-match-patch algorithm
        - Version numbering: Semantic versioning (1.0.0 → 1.1.0 → 2.0.0)

      api_endpoints:
        - "POST /api/v1/sops/{id}/versions - Create new version"
        - "GET /api/v1/sops/{id}/versions - List all versions"
        - "GET /api/v1/sops/{id}/versions/{version_id} - Get specific version"
        - "POST /api/v1/sops/{id}/versions/{version_id}/revert - Revert to version"
        - "GET /api/v1/sops/{id}/versions/compare?v1={id1}&v2={id2} - Compare versions"

      dependencies:
        - "Python `diff-match-patch` library (Apache 2.0 license)"
        - "PostgreSQL JSONB for delta storage"

    estimated_effort:
      backend: "3 days (2 FTE)"
      frontend: "2 days (2 FTE)"
      testing: "1 day (1 FTE QA)"
      total: "6 FTE-days"

  - id: FR17
    title: "Multi-User Real-Time Collaboration"
    priority: "MANDATORY"
    user_story: |
      As a team lead, I want 5 developers to edit the same SOP simultaneously
      so that we can co-create SOPs in real-time (like Google Docs).

    acceptance_criteria:
      - criterion: "5 users can edit same SOP concurrently"
        test_method: "Manual test: Open SOP in 5 browsers → Type in each"
        expected_result: "All edits visible in real-time (<500ms latency)"

      - criterion: "See other users' cursors + names"
        test_method: "Manual test: 2 users editing → See cursor positions"
        expected_result: "Color-coded cursor with username label"

      - criterion: "Conflict-free merge (no data loss)"
        test_method: "Chaos test: 5 users edit same sentence simultaneously"
        expected_result: "All edits preserved (CRDT algorithm)"

      - criterion: "Offline editing supported (sync when back online)"
        test_method: "Manual test: Disconnect WiFi → Edit → Reconnect"
        expected_result: "Changes synced after reconnect (<5s)"

      - criterion: "Performance: 5 concurrent editors, <500ms update latency"
        test_method: "Load test: 5 users typing 100 chars/min for 10 min"
        expected_result: "p95 latency <500ms, 0 conflicts"

    technical_details:
      implementation: |
        Real-Time Stack:
        - WebSocket server (Python `websockets` library)
        - CRDT algorithm (Yjs library - MIT license)
        - Redis Pub/Sub for multi-instance sync

        Database Schema:
        - `collaboration_sessions` table (id, sop_id, user_id, cursor_position,
          last_seen, color_code)
        - `edit_operations` table (id, session_id, operation_type, timestamp,
          content_delta)

        Conflict Resolution:
        - Yjs CRDT: Operational Transformation (OT) for text edits
        - Last-Write-Wins (LWW) for metadata (title, tags)

      api_endpoints:
        - "WebSocket /ws/sops/{id}/collaborate - Real-time edit stream"
        - "GET /api/v1/sops/{id}/collaborators - List active users"
        - "POST /api/v1/sops/{id}/cursor - Update cursor position"

      dependencies:
        - "Yjs (CRDT library) - MIT license"
        - "websockets (Python) - BSD license"
        - "Redis Pub/Sub for WebSocket scaling"

    estimated_effort:
      backend: "5 days (2 FTE)"
      frontend: "4 days (2 FTE)"
      testing: "2 days (1 FTE QA)"
      total: "11 FTE-days"

  - id: FR18
    title: "5 New Enterprise SOP Types"
    priority: "MANDATORY"
    user_story: |
      As an enterprise team, I need 5 additional SOP types (disaster recovery,
      change management, training, compliance audit, capacity planning) to cover
      all operational scenarios.

    acceptance_criteria:
      - criterion: "9. Disaster Recovery SOP type available"
        test_method: "Manual test: Click 'New SOP' → Select 'Disaster Recovery'"
        expected_result: "Template includes: Scenario, RTO/RPO, Runbook, Contacts"

      - criterion: "10. Change Management SOP type available"
        test_method: "Manual test: Select 'Change Management' type"
        expected_result: "Template includes: Change request, Impact analysis, Rollback plan, Approval"

      - criterion: "11. Training SOP type available"
        test_method: "Manual test: Select 'Training' type"
        expected_result: "Template includes: Learning objectives, Prerequisites, Steps, Quiz"

      - criterion: "12. Compliance Audit SOP type available"
        test_method: "Manual test: Select 'Compliance Audit' type"
        expected_result: "Template includes: Audit scope, Checklist, Evidence, Findings"

      - criterion: "13. Capacity Planning SOP type available"
        test_method: "Manual test: Select 'Capacity Planning' type"
        expected_result: "Template includes: Current capacity, Forecast, Thresholds, Scaling plan"

      - criterion: "AI generates high-quality content for all 5 types"
        test_method: "User test: Generate 10 SOPs per type → Rate quality"
        expected_result: "Average quality ≥4.2/5 for each type"

    technical_details:
      implementation: |
        Database Schema:
        - Add 5 new enum values to `sop_type` column:
          DISASTER_RECOVERY, CHANGE_MANAGEMENT, TRAINING,
          COMPLIANCE_AUDIT, CAPACITY_PLANNING

        AI Prompts:
        - Create 5 new prompt templates (1 per type)
        - Total: 13 SOP types (8 existing + 5 new)

        Frontend:
        - Update SOP type selector (dropdown menu)
        - Add 5 new template forms

      api_endpoints:
        - "GET /api/v1/sop-types - List all 13 types"
        - "POST /api/v1/sops/generate - Enhanced with 5 new types"

      dependencies:
        - "Ollama prompt engineering for 5 new types"

    estimated_effort:
      backend: "2 days (1 FTE)"
      frontend: "2 days (1 FTE)"
      ai_prompts: "3 days (1 FTE)"
      testing: "1 day (1 FTE QA)"
      total: "8 FTE-days"

  - id: FR19
    title: "Advanced Team Analytics Dashboard"
    priority: "MANDATORY"
    user_story: |
      As a team lead, I want to see analytics (who creates SOPs, which types
      are popular, usage trends) so that I can measure team SOP effectiveness.

    acceptance_criteria:
      - criterion: "Team usage dashboard (SOPs created per team)"
        test_method: "Manual test: Navigate to /analytics → See team breakdown"
        expected_result: "Bar chart: Team A (15 SOPs), Team B (23 SOPs), ..."

      - criterion: "SOP type distribution (pie chart)"
        test_method: "Manual test: View analytics → See type breakdown"
        expected_result: "Pie chart: Deployment (30%), Troubleshooting (25%), ..."

      - criterion: "User leaderboard (top SOP creators)"
        test_method: "Manual test: View analytics → See leaderboard"
        expected_result: "Table: 1. John (12 SOPs), 2. Jane (10 SOPs), ..."

      - criterion: "Time series chart (SOPs created over time)"
        test_method: "Manual test: View analytics → See trend"
        expected_result: "Line chart: Week 1 (5 SOPs), Week 2 (12 SOPs), ..."

      - criterion: "Export analytics as CSV"
        test_method: "Manual test: Click 'Export CSV' button"
        expected_result: "CSV file downloaded with all analytics data"

      - criterion: "Dashboard loads in <2s with 250+ SOPs"
        test_method: "Load test: Seed 250 SOPs → Measure load time"
        expected_result: "Time to Interactive (TTI) <2s (p95)"

    technical_details:
      implementation: |
        Database Schema:
        - `analytics_events` table (id, event_type, user_id, sop_id,
          team_id, timestamp, metadata)
        - Pre-aggregated views: `analytics_daily_summary` (materialized view)

        Frontend:
        - React + Recharts library (MIT license)
        - Real-time updates (WebSocket or 30s polling)

        Caching:
        - Redis cache (30 min TTL for analytics)
        - Reduce DB load (aggregations are expensive)

      api_endpoints:
        - "GET /api/v1/analytics/teams - Team usage stats"
        - "GET /api/v1/analytics/users - User leaderboard"
        - "GET /api/v1/analytics/types - SOP type distribution"
        - "GET /api/v1/analytics/timeline - Time series data"
        - "GET /api/v1/analytics/export - CSV export"

      dependencies:
        - "Recharts (React charting) - MIT license"
        - "PostgreSQL materialized views for aggregation"

    estimated_effort:
      backend: "3 days (2 FTE)"
      frontend: "3 days (2 FTE)"
      testing: "1 day (1 FTE QA)"
      total: "7 FTE-days"

  - id: FR20
    title: "ServiceNow Integration"
    priority: "MANDATORY"
    user_story: |
      As an enterprise team using ServiceNow, I want to export SOPs directly
      to ServiceNow Knowledge Base so that I don't manually copy-paste (error-prone).

    acceptance_criteria:
      - criterion: "Connect ServiceNow account (OAuth 2.0)"
        test_method: "Manual test: Settings → ServiceNow → Authorize"
        expected_result: "OAuth flow completes → Token stored securely"

      - criterion: "Export SOP to ServiceNow KB (1-click)"
        test_method: "Manual test: SOP page → Click 'Export to ServiceNow'"
        expected_result: "SOP created in ServiceNow KB with title, content, tags"

      - criterion: "Sync SOP updates (bi-directional)"
        test_method: "Manual test: Edit SOP locally → Click 'Sync to ServiceNow'"
        expected_result: "ServiceNow KB article updated with changes"

      - criterion: "Link to ServiceNow article (view in ServiceNow)"
        test_method: "Manual test: Exported SOP shows ServiceNow icon + link"
        expected_result: "Click link → Opens ServiceNow article in new tab"

      - criterion: "Export succeeds in <5s (p95)"
        test_method: "Load test: Export 100 SOPs concurrently"
        expected_result: "p95 latency <5s, 0 failures"

    technical_details:
      implementation: |
        ServiceNow API:
        - REST API: /api/now/table/kb_knowledge
        - OAuth 2.0: Client credentials flow
        - Rate limit: 100 req/min (implement retry with backoff)

        Database Schema:
        - `servicenow_integrations` table (id, user_id, instance_url,
          access_token_encrypted, refresh_token_encrypted)
        - `servicenow_syncs` table (id, sop_id, kb_article_id,
          last_synced_at, sync_status)

        Security:
        - Encrypt tokens with AES-256 (PostgreSQL pgcrypto)
        - Rotate tokens every 90 days (OAuth refresh)

      api_endpoints:
        - "POST /api/v1/integrations/servicenow/auth - OAuth flow"
        - "POST /api/v1/integrations/servicenow/export - Export SOP"
        - "POST /api/v1/integrations/servicenow/sync - Sync SOP"
        - "DELETE /api/v1/integrations/servicenow - Disconnect"

      dependencies:
        - "ServiceNow REST API (external dependency)"
        - "requests library for HTTP calls"

    estimated_effort:
      backend: "4 days (2 FTE)"
      frontend: "2 days (1 FTE)"
      testing: "2 days (1 FTE QA + ServiceNow sandbox)"
      total: "8 FTE-days"

  - id: FR21
    title: "Jira Integration (Enhanced)"
    priority: "RECOMMENDED"
    user_story: |
      As a developer, I want to link SOPs to Jira tickets (not just export)
      so that I can track which SOPs are related to which incidents/projects.

    acceptance_criteria:
      - criterion: "Link SOP to Jira ticket (bi-directional)"
        test_method: "Manual test: SOP page → 'Link Jira' → Enter ticket ID"
        expected_result: "SOP shows Jira ticket badge + link"

      - criterion: "View all SOPs for a Jira ticket"
        test_method: "Manual test: Jira ticket → See linked SOPs in sidebar"
        expected_result: "List of SOPs with titles + links"

      - criterion: "Auto-link on SOP creation (if Jira ticket in context)"
        test_method: "Integration test: Create SOP from Jira plugin → Auto-linked"
        expected_result: "SOP metadata includes jira_ticket_id"

      - criterion: "Sync status: Jira ticket closed → SOP marked 'Archived'"
        test_method: "Manual test: Close Jira ticket → Check SOP status"
        expected_result: "SOP status = 'Archived' (automatic sync)"

    technical_details:
      implementation: |
        Jira API:
        - REST API: /rest/api/3/issue/{issueIdOrKey}
        - Webhook: Receive ticket status changes

        Database Schema:
        - `jira_links` table (id, sop_id, jira_ticket_id, project_key,
          created_at, sync_status)

      api_endpoints:
        - "POST /api/v1/integrations/jira/link - Link SOP to ticket"
        - "GET /api/v1/integrations/jira/sops?ticket_id={id} - Get SOPs for ticket"
        - "POST /api/v1/integrations/jira/webhook - Receive Jira events"

      dependencies:
        - "Jira Cloud REST API v3"

    estimated_effort:
      backend: "3 days (1 FTE)"
      frontend: "2 days (1 FTE)"
      testing: "1 day (1 FTE QA)"
      total: "6 FTE-days"

  - id: FR22
    title: "PagerDuty Integration"
    priority: "RECOMMENDED"
    user_story: |
      As an on-call engineer, I want SOPs to appear in PagerDuty incident notes
      so that I can access runbooks without leaving PagerDuty.

    acceptance_criteria:
      - criterion: "PagerDuty incident triggers SOP recommendation"
        test_method: "Integration test: Trigger alert → Check incident notes"
        expected_result: "PagerDuty note includes: 'Recommended SOP: [link]'"

      - criterion: "SOP linked to PagerDuty service"
        test_method: "Manual test: Link SOP to 'API Service' → Trigger alert"
        expected_result: "Alert for API Service includes linked SOP"

      - criterion: "Create SOP from resolved incident (1-click)"
        test_method: "Manual test: Resolve incident → Click 'Create SOP'"
        expected_result: "SOP pre-filled with incident timeline + resolution"

    technical_details:
      implementation: |
        PagerDuty API:
        - REST API: /incidents, /services
        - Webhook: Receive incident.triggered events

        Database Schema:
        - `pagerduty_links` table (id, sop_id, service_id, created_at)

      api_endpoints:
        - "POST /api/v1/integrations/pagerduty/link - Link SOP to service"
        - "POST /api/v1/integrations/pagerduty/webhook - Receive incidents"

      dependencies:
        - "PagerDuty REST API v2"

    estimated_effort:
      backend: "2 days (1 FTE)"
      frontend: "1 day (1 FTE)"
      testing: "1 day (1 FTE QA)"
      total: "4 FTE-days"

  - id: FR23
    title: "Datadog Integration"
    priority: "OPTIONAL"
    user_story: |
      As a DevOps engineer, I want SOPs to be linked to Datadog monitors
