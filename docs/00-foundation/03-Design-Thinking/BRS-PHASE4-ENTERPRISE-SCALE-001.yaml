# ==============================================================================
# NON-FUNCTIONAL REQUIREMENTS (NFR10-NFR20)
# ==============================================================================

non_functional_requirements:
  - id: NFR10
    category: "Performance"
    title: "100K Concurrent User Scalability"
    requirement: |
      System must support 100,000 concurrent users (10-year headroom) with
      <2s page load time (p95) and <100ms API latency (p95).

    measurement:
      test_method: "Load test with Locust (100K virtual users)"
      success_criteria:
        - "API p95 latency: <100ms"
        - "Dashboard load (TTI): <2s"
        - "WebSocket connections: 100K stable"
        - "CPU usage: <70% (4 backend pods)"
        - "Memory usage: <80% (4 backend pods)"

      test_scenarios:
        - "Scenario 1: 100K users browsing (read-heavy)"
        - "Scenario 2: 10K users editing (write-heavy)"
        - "Scenario 3: 5K concurrent real-time collaborations"

    implementation:
      - "Horizontal scaling: 4 backend pods → 20 pods (auto-scaling)"
      - "Database: PostgreSQL read replicas (3 replicas)"
      - "Redis: Redis Cluster (6 nodes, sharding)"
      - "CDN: CloudFront for static assets"
      - "Load balancer: NGINX with least-connections algorithm"

    estimated_effort: "5 days (2 FTE DevOps)"

  - id: NFR11
    category: "Reliability"
    title: "99.9% Uptime SLA (Enterprise Tier)"
    requirement: |
      System must maintain 99.9% uptime (43.2 min downtime/month allowed)
      with multi-region HA and <5s failover.

    measurement:
      test_method: "Chaos engineering (kill pods, zones, regions)"
      success_criteria:
        - "Uptime: ≥99.9% (measured monthly)"
        - "Failover time: <5s (pod/node failure)"
        - "Data loss: 0 bytes (synchronous replication)"
        - "P0 incidents: 0/month"

      test_scenarios:
        - "Kill 1 backend pod → Failover <5s"
        - "Kill 1 Kubernetes node → Reschedule <60s"
        - "Simulate zone outage → Multi-zone HA recovers"

    implementation:
      - "Multi-region: US-East (primary) + US-West (standby)"
      - "PostgreSQL: Synchronous replication (primary + standby)"
      - "Redis: Redis Sentinel (3 nodes, auto-failover)"
      - "Kubernetes: 3-node control plane (HA)"
      - "Monitoring: Prometheus + Alertmanager + PagerDuty"

    estimated_effort: "4 days (2 FTE DevOps)"

  - id: NFR12
    category: "Security"
    title: "SOC 2 Type II Audit Ready"
    requirement: |
      System must meet SOC 2 Type II requirements for Trust Services Criteria
      (Security, Availability, Confidentiality).

    measurement:
      test_method: "External audit by SOC 2 auditor (Deloitte)"
      success_criteria:
        - "0 critical findings"
        - "0 high findings"
        - "<3 medium findings"

      controls:
        - "Access control: RBAC with 13 roles"
        - "Audit logging: Immutable logs (append-only)"
        - "Encryption: AES-256 at-rest, TLS 1.3 in-transit"
        - "Secrets: HashiCorp Vault (90-day rotation)"
        - "Vulnerability: Weekly scans (Grype)"
        - "Incident response: Runbooks + drills"

    implementation:
      - "Audit log: PostgreSQL append-only table (no DELETE)"
      - "Log retention: 7 years (compliance requirement)"
      - "RBAC: Fine-grained permissions (sops.read, sops.write, etc)"
      - "MFA: Mandatory for admin roles"

    estimated_effort: "6 days (2 FTE Security + 1 FTE DevOps)"

  - id: NFR13
    category: "Performance"
    title: "Real-Time Collaboration Latency <500ms"
    requirement: |
      Multi-user editing must have <500ms update latency (p95) for 5 concurrent
      editors on same SOP.

    measurement:
      test_method: "Load test: 5 users typing 100 chars/min for 10 min"
      success_criteria:
        - "p95 latency: <500ms (edit → all users see update)"
        - "p99 latency: <1s"
        - "0 conflicts (CRDT algorithm)"
        - "0 data loss"

      test_scenarios:
        - "5 users editing different paragraphs (no conflicts)"
        - "5 users editing same sentence (CRDT merge)"
        - "1 user offline → reconnect → sync <5s"

    implementation:
      - "WebSocket server: Python `websockets` (3 replicas)"
      - "Redis Pub/Sub: Broadcast edits to all WebSocket instances"
      - "CRDT: Yjs library (MIT license)"
      - "Message queue: Redis Streams (ordered delivery)"

    estimated_effort: "3 days (2 FTE Backend)"

  - id: NFR14
    category: "Usability"
    title: "≥4.5/5 Satisfaction Score at 4x Scale"
    requirement: |
      Maintain ≥4.5/5 developer satisfaction (Phase 3: 4.6/5) despite 4x scale
      (45 → 180 developers).

    measurement:
      test_method: "Weekly NPS survey (Google Forms)"
      success_criteria:
        - "Average: ≥4.5/5"
        - "Response rate: ≥50% (90/180 devs)"

      survey_questions:
        - "Ease of use (1-5)"
        - "Feature completeness (1-5)"
        - "Performance (1-5)"
        - "Would you recommend to others? (NPS)"

    implementation:
      - "In-app survey (pop-up after Week 4)"
      - "Weekly email survey (Google Forms)"
      - "Feedback widget (always visible in dashboard)"

    estimated_effort: "1 day (1 FTE PM)"

  - id: NFR15
    category: "Cost"
    title: "AI Cost <$3.00/SOP (Optimize Ollama Routing)"
    requirement: |
      Reduce AI generation cost from $3.12/SOP (Phase 3) to <$3.00/SOP by
      optimizing Ollama routing (increase from 93% → 95%).

    measurement:
      test_method: "Cost tracking (ai_usage_logs table)"
      success_criteria:
        - "Average cost/SOP: <$3.00"
        - "Ollama usage: ≥95%"
        - "Total AI cost (12 weeks): <$750"

      calculation:
        - "250 SOPs × $3.00 = $750 budget"
        - "Ollama: $0.00/SOP (local), Claude: $50/SOP, GPT-4o: $40/SOP"

    implementation:
      - "Ollama health check: Ping every 10s (detect failures faster)"
      - "Retry logic: 3 retries before Claude fallback (reduce false failures)"
      - "Load balancing: Route to least-loaded Ollama replica"

    estimated_effort: "2 days (1 FTE Backend)"

  - id: NFR16
    category: "Data Integrity"
    title: "Zero Data Loss (CRDT + Conflict-Free Merge)"
    requirement: |
      Multi-user collaboration must guarantee zero data loss even with
      simultaneous edits (CRDT algorithm proven).

    measurement:
      test_method: "Chaos test: 5 users edit same sentence simultaneously"
      success_criteria:
        - "All edits preserved (no overwrites)"
        - "Merge is commutative: merge(A,B) = merge(B,A)"
        - "Merge is associative: merge(A, merge(B,C)) = merge(merge(A,B), C)"

      test_scenarios:
        - "User A types 'Hello', User B types 'World' → Result: 'HelloWorld' or 'WorldHello' (order preserved)"
        - "User A deletes char, User B inserts char → Both operations applied"

    implementation:
      - "Yjs CRDT: Proven conflict-free algorithm (10+ years production)"
      - "Operation log: Store all edit operations (audit trail)"
      - "LPS Proof: Mathematical proof of CRDT properties"

    estimated_effort: "Covered in FR17 (no additional effort)"

  - id: NFR17
    category: "Maintainability"
    title: "≥95% Test Coverage (Unit + Integration + E2E)"
    requirement: |
      Maintain ≥95% test coverage (Phase 3: 96%) with increased codebase complexity.

    measurement:
      test_method: "pytest-cov (backend), vitest coverage (frontend)"
      success_criteria:
        - "Backend: ≥95%"
        - "Frontend: ≥85% (lower due to UI complexity)"
        - "E2E: 50 critical user journeys (Playwright)"

      test_types:
        - "Unit: 500+ tests (backend + frontend)"
        - "Integration: 80+ tests (API contracts)"
        - "E2E: 50+ tests (Playwright)"

    implementation:
      - "Pre-commit hook: Block commits if coverage drops"
      - "CI/CD: Run all tests on every PR"
      - "Coverage report: Posted to PR comments"

    estimated_effort: "Ongoing (2 FTE QA)"

  - id: NFR18
    category: "Compliance"
    title: "GDPR + CCPA Data Privacy"
    requirement: |
      Support data privacy regulations (GDPR, CCPA) with user data export/deletion.

    measurement:
      test_method: "Manual test: Request data export/deletion"
      success_criteria:
        - "Data export: <24 hours (JSON file)"
        - "Data deletion: <7 days (hard delete)"
        - "Audit trail: 7-year retention"

      controls:
        - "Data export API: GET /api/v1/users/me/export"
        - "Data deletion API: DELETE /api/v1/users/me (+ cascade)"
        - "Privacy policy: Updated for GDPR/CCPA"

    implementation:
      - "Export: JSON file with all user data (SOPs, edits, analytics)"
      - "Deletion: Cascade delete (user → sops → versions → edits)"
      - "Anonymization: Replace PII with 'DELETED_USER'"

    estimated_effort: "3 days (1 FTE Backend + 1 FTE Legal)"

  - id: NFR19
    category: "Observability"
    title: "Full-Stack Observability (Traces + Logs + Metrics)"
    requirement: |
      Implement distributed tracing, structured logging, and Prometheus metrics
      for 100% observability.

    measurement:
      test_method: "Simulate production load → Trace all requests"
      success_criteria:
        - "Traces: 100% of API requests (OpenTelemetry)"
        - "Logs: Structured JSON logs (Elasticsearch)"
        - "Metrics: 50+ Prometheus metrics (Grafana dashboards)"

      tools:
        - "Tracing: OpenTelemetry → Jaeger"
        - "Logging: Python logging → Fluentd → Elasticsearch"
        - "Metrics: Prometheus → Grafana"

    implementation:
      - "OpenTelemetry SDK: Auto-instrument FastAPI"
      - "Trace context: Propagate across services (Redis, PostgreSQL)"
      - "Dashboards: Grafana (p95 latency, error rate, throughput)"

    estimated_effort: "4 days (2 FTE DevOps)"

  - id: NFR20
    category: "Zero Mock Policy"
    title: "100% Real Implementations (No Mocks)"
    requirement: |
      Continue Zero Mock Policy (Phase 3: 100%) - all features must be fully
      implemented (no placeholders, no TODOs).

    measurement:
      test_method: "Code review + pre-commit hook"
      success_criteria:
        - "0 occurrences: `// TODO`, `pass # implement`, `return { mock: true }`"
        - "100% integration tests with real services"

      enforcement:
        - "Pre-commit hook: Grep for banned keywords"
        - "CI/CD: Fail build if mocks detected"
        - "Code review: 2+ approvers check for mocks"

    implementation:
      - "Same as Phase 3 (policy already enforced)"

    estimated_effort: "0 days (existing policy)"

