    impact: "HIGH"
    probability: "LOW"
    mitigation: |
      - Use proven library (Yjs - 10+ years production)
      - Prototype in Week 1 (validate before full implementation)
      - Fallback: Pessimistic locking (1 user edits at a time)

  - risk: "ServiceNow API rate limits cause sync failures"
    impact: "MEDIUM"
    probability: "MEDIUM"
    mitigation: |
      - Implement exponential backoff + retry (3 attempts)
      - Queue exports (Redis queue, process async)
      - Contact ServiceNow for rate limit increase

  - risk: "SOC 2 audit finds critical security gaps"
    impact: "HIGH"
    probability: "LOW"
