      api_endpoints:
        - "POST /api/v1/integrations/datadog/link"
        - "POST /api/v1/integrations/datadog/webhook"

      dependencies:
        - "Datadog API v1"

    estimated_effort:
      backend: "2 days (1 FTE)"
      frontend: "1 day (1 FTE)"
      testing: "1 day (1 FTE QA)"
      total: "4 FTE-days"

  - id: FR24
    title: "Slack Integration (Enhanced Notifications)"
    priority: "RECOMMENDED"
    user_story: |
      As a team member, I want Slack notifications when SOPs are created/updated
      so that I stay informed without checking the dashboard.

    acceptance_criteria:
      - criterion: "Slack channel receives SOP creation notification"
        test_method: "Manual test: Create SOP → Check #sop-updates channel"
        expected_result: "Message: 'John created SOP: Deploy API v2 [link]'"

      - criterion: "Slack bot command: /sop search [query]"
        test_method: "Manual test: Type '/sop search deployment' in Slack"
        expected_result: "Bot replies with top 5 matching SOPs + links"

      - criterion: "Slack bot command: /sop create [title]"
        test_method: "Manual test: Type '/sop create Rollback API' in Slack"
        expected_result: "Bot opens modal → AI generates SOP → Posts to channel"

    technical_details:
      implementation: |
        Slack API:
        - Slack Bot API (OAuth 2.0)
        - Slash commands: /sop search, /sop create
        - Incoming webhooks for notifications

        Database Schema:
        - `slack_integrations` table (id, team_id, channel_id,
