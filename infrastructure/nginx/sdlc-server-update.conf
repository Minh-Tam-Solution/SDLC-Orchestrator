# ============================================
# SDLC Platform - sdlc.nhatquangholding.com
# Updated: December 29, 2025
# Architecture: Dual Frontend (Landing 8311 + Dashboard 8310)
# ADR-024: Keep Dual Frontend Architecture
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sdlc.nhatquangholding.com;

    ssl_certificate /etc/letsencrypt/live/nhatquangholding.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nhatquangholding.com/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-dotfiles.conf;

    client_max_body_size 50M;

    # ========== Backend API routes (port 8300) ==========
    location /api/ {
        proxy_pass http://127.0.0.1:8300;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /health {
        proxy_pass http://127.0.0.1:8300;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /openapi-docs {
        proxy_pass http://127.0.0.1:8300/api/docs;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8300/api/redoc;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8300;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    # ========== END: Backend API routes ==========

    # ========== Landing Page Routes (Next.js - port 8311) ==========
    # Marketing pages, Auth, Docs - MUST be before catch-all /

    # OAuth callback routes - MUST go to Landing
    location /auth/ {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Login page
    location /login {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Register page
    location /register {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Forgot password
    location /forgot-password {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Documentation pages
    location /docs {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Checkout and pricing
    location /checkout {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /pricing {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Demo and features pages
    location /demo {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /features {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Marketplace (Sprint 60)
    location /marketplace {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Next.js static files
    location /_next/ {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    # ========== END: Landing Page Routes ==========

    # ========== Dashboard Routes (React Vite - port 8310) ==========
    # Authenticated users - /platform-admin routes only

    # React static assets
    location /assets/ {
        proxy_pass http://127.0.0.1:8310;
        include /etc/nginx/snippets/proxy-params.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Dashboard - authenticated users (SPA routing)
    location /platform-admin {
        proxy_pass http://127.0.0.1:8310;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    # ========== END: Dashboard Routes ==========

    # ========== Landing Page Homepage (Next.js - port 8311) ==========
    # This MUST be last - catch-all for marketing homepage
    location / {
        proxy_pass http://127.0.0.1:8311;
        include /etc/nginx/snippets/proxy-params.conf;
    }
    # ========== END: Landing Page Homepage ==========
}
