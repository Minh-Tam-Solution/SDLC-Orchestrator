name: Framework Version Alignment

# Triggers when Framework submodule is updated
on:
  push:
    branches: [main]
    paths:
      - 'SDLC-Enterprise-Framework/**'
  pull_request:
    branches: [main]
    paths:
      - 'SDLC-Enterprise-Framework/**'

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
      old_version: ${{ steps.check.outputs.old_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect Framework Version Change
        id: check
        run: |
          # Get current Framework version
          if [ -f "SDLC-Enterprise-Framework/VERSION" ]; then
            NEW_VERSION=$(cat SDLC-Enterprise-Framework/VERSION)
          elif [ -f "SDLC-Enterprise-Framework/01-Overview/framework-overview.md" ]; then
            # Extract version from overview if VERSION file doesn't exist
            NEW_VERSION=$(grep -m1 "Version.*:" SDLC-Enterprise-Framework/01-Overview/framework-overview.md | sed 's/.*: *//' | tr -d '[:space:]')
          else
            NEW_VERSION="unknown"
          fi

          # Get previous version from git history
          git fetch origin main --depth=2 || true
          OLD_VERSION=$(git show HEAD~1:SDLC-Enterprise-Framework/VERSION 2>/dev/null || echo "unknown")

          echo "Previous version: $OLD_VERSION"
          echo "Current version: $NEW_VERSION"

          if [ "$OLD_VERSION" != "$NEW_VERSION" ] && [ "$NEW_VERSION" != "unknown" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT
            echo "🔔 Framework version changed: $OLD_VERSION → $NEW_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT
            echo "✅ Framework version unchanged"
          fi

  create-alignment-issues:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.version_changed == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Alignment Issues for All Frontends
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ needs.detect-version-change.outputs.new_version }}';
            const oldVersion = '${{ needs.detect-version-change.outputs.old_version }}';

            const frontends = [
              {
                name: 'Web Dashboard',
                owner: 'Frontend Team',
                checklist: [
                  'Update package.json version references',
                  'Update UI components for new features',
                  'Run E2E tests with new validation rules',
                  'Update Frontend-Alignment-Matrix.md'
                ]
              },
              {
                name: 'CLI (sdlcctl)',
                owner: 'Backend Team',
                checklist: [
                  'Update sdlcctl/__init__.py SDLC_VERSION',
                  'Update validation rules per new spec',
                  'Update sdlcctl spec commands if needed',
                  'Run pytest with new validation rules',
                  'Publish new version to PyPI'
                ]
              },
              {
                name: 'VS Code Extension',
                owner: 'Frontend Team',
                checklist: [
                  'Update package.json version/description',
                  'Update validation logic in codegenApi.ts',
                  'Update specValidationCommand.ts if needed',
                  'Run Extension tests',
                  'Publish new version to VS Code Marketplace'
                ]
              }
            ];

            for (const frontend of frontends) {
              const checklistMd = frontend.checklist.map(item => `- [ ] ${item}`).join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Framework Alignment] Update ${frontend.name} to SDLC ${newVersion}`,
                body: `## Framework Version Change Detected

**Previous Version**: ${oldVersion}
**New Version**: ${newVersion}

## Action Required

The SDLC Enterprise Framework has been updated. Please align **${frontend.name}** with the new version.

## Checklist

${checklistMd}

## References

- [ADR-045: Multi-Frontend Alignment Strategy](docs/02-design/01-ADRs/ADR-045-Multi-Frontend-Alignment-Strategy.md)
- [Frontend Alignment Matrix](docs/01-planning/01-Requirements/Frontend-Alignment-Matrix.md)
- [Framework Changelog](SDLC-Enterprise-Framework/CHANGELOG.md)

## Owner

Assigned to: **${frontend.owner}**

---
*This issue was automatically created by the Framework Alignment workflow.*
`,
                labels: ['framework-alignment', 'p0', 'automated'],
                assignees: []
              });

              console.log(`Created alignment issue for ${frontend.name}`);
            }

  check-alignment-status:
    needs: detect-version-change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check CLI Version Alignment
        run: |
          FRAMEWORK_VERSION="${{ needs.detect-version-change.outputs.new_version }}"
          echo "Framework Version: $FRAMEWORK_VERSION"

          # Check CLI version
          if [ -f "backend/sdlcctl/sdlcctl/__init__.py" ]; then
            CLI_VERSION=$(grep 'SDLC_VERSION' backend/sdlcctl/sdlcctl/__init__.py | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "CLI SDLC Version: $CLI_VERSION"

            if [ "$CLI_VERSION" != "$FRAMEWORK_VERSION" ]; then
              echo "⚠️ CLI version mismatch: $CLI_VERSION != $FRAMEWORK_VERSION"
            else
              echo "✅ CLI aligned with Framework"
            fi
          fi

      - name: Check Extension Version Alignment
        run: |
          FRAMEWORK_VERSION="${{ needs.detect-version-change.outputs.new_version }}"

          # Check Extension package.json
          if [ -f "vscode-extension/package.json" ]; then
            # Look for SDLC version in description
            EXT_DESC=$(grep '"description"' vscode-extension/package.json | head -1)
            if echo "$EXT_DESC" | grep -q "$FRAMEWORK_VERSION"; then
              echo "✅ Extension description references Framework $FRAMEWORK_VERSION"
            else
              echo "⚠️ Extension description may need update for $FRAMEWORK_VERSION"
            fi
          fi

      - name: Check Frontend Alignment Matrix
        run: |
          FRAMEWORK_VERSION="${{ needs.detect-version-change.outputs.new_version }}"

          if [ -f "docs/01-planning/01-Requirements/Frontend-Alignment-Matrix.md" ]; then
            if grep -q "$FRAMEWORK_VERSION" docs/01-planning/01-Requirements/Frontend-Alignment-Matrix.md; then
              echo "✅ Frontend Alignment Matrix references Framework $FRAMEWORK_VERSION"
            else
              echo "⚠️ Frontend Alignment Matrix may need update for $FRAMEWORK_VERSION"
            fi
          fi

      - name: Alignment Summary
        run: |
          echo ""
          echo "📊 Framework Alignment Status"
          echo "=============================="
          echo "Framework Version: ${{ needs.detect-version-change.outputs.new_version }}"
          echo ""
          echo "See ADR-045 for alignment process:"
          echo "  docs/02-design/01-ADRs/ADR-045-Multi-Frontend-Alignment-Strategy.md"

  block-pr-if-misaligned:
    needs: [detect-version-change, check-alignment-status]
    if: github.event_name == 'pull_request' && needs.detect-version-change.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check for Open Alignment Issues
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ needs.detect-version-change.outputs.new_version }}';

            // Check for open alignment issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'framework-alignment',
              state: 'open'
            });

            const alignmentIssues = issues.data.filter(i =>
              i.title.includes('[Framework Alignment]') && i.title.includes(newVersion)
            );

            if (alignmentIssues.length > 0) {
              console.log(`⚠️ ${alignmentIssues.length} open alignment issue(s) for SDLC ${newVersion}`);
              console.log('Consider closing these before merging Framework update:');
              alignmentIssues.forEach(i => console.log(`  - #${i.number}: ${i.title}`));

              // Post comment on PR
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `⚠️ **Framework Alignment Required**\n\n` +
                      `This PR updates the Framework to SDLC ${newVersion}.\n\n` +
                      `**Open alignment issues:**\n` +
                      alignmentIssues.map(i => `- #${i.number}: ${i.title}`).join('\n') + '\n\n' +
                      `Consider closing these issues before merging, or merge and address alignment in follow-up sprints.\n\n` +
                      `See [ADR-045](docs/02-design/01-ADRs/ADR-045-Multi-Frontend-Alignment-Strategy.md) for alignment process.`
              });
            } else {
              console.log('✅ No open alignment issues - safe to merge');
            }
