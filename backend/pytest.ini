[pytest]
# SDLC Orchestrator - Pytest Configuration
# Sprint 132 - Go-Live Preparation
#
# This configuration ensures:
# 1. Only backend/tests is collected (not sdlcctl/tests)
# 2. Async tests work properly
# 3. Clear test output

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore sdlcctl subpackage tests (run separately)
norecursedirs =
    sdlcctl
    .git
    __pycache__
    .pytest_cache

# Async support
asyncio_mode = auto

# Output settings
addopts = -v --tb=short
