# Break Glass Mechanism - Emergency Bypass Configuration
# Emergency governance bypass for production P0/P1 incidents
#
# Version: 1.0.0
# Last Updated: January 27, 2026
# Authority: Plan PRE-PHASE 0 - Break Glass Mechanism
#
# CRITICAL SAFETY PRINCIPLE:
# "Break Glass is for emergencies ONLY. All bypasses are logged, audited,
#  and require post-incident review within 24 hours."

break_glass:
  enabled: true
  description: |
    Emergency bypass when CEO unavailable and production is down.
    Use ONLY for P0/P1 incidents. All usage logged and requires post-mortem.

  # Authorization Tiers
  authorization:
    tier_1:
      roles: ["Tech Lead", "On-Call Engineer"]
      can_initiate: true
      can_approve: false
      max_duration: "4 hours"

    tier_2:
      roles: ["CTO", "CEO"]
      can_initiate: true
      can_approve: true
      max_duration: "24 hours"

    # Break Glass can only be approved by Tier 2
    approval_required_from: ["CTO", "CEO"]

  # Emergency Process (3 Steps)
  process:
    step_1:
      name: "Attempt Normal Governance"
      action: "Try standard governance validation"
      timeout: "5 minutes"
      on_timeout: "Escalate to Step 2"

    step_2:
      name: "Request CEO Approval"
      action: "Send urgent notification to CEO/CTO"
      timeout: "15 minutes"
      notification_channels:
        - type: "slack"
          target: "@ceo"
          priority: "urgent"
          message: |
            🚨 URGENT GOVERNANCE APPROVAL NEEDED
            PR: {pr_number}
            Reason: {reason}
            Requester: {requester}
            Severity: {severity}

            [Approve] [Reject] [Escalate]

        - type: "sms"
          target: "CEO_PHONE"
          message: |
            URGENT: Governance approval needed for PR {pr_number}.
            Reply APPROVE or REJECT.

        - type: "phone_call"
          target: "CEO_PHONE"
          trigger_after: "10 minutes no response"

      on_timeout: "Escalate to Step 3"

    step_3:
      name: "Break Glass (Emergency Bypass)"
      action: "Allow merge with automatic audit trail"
      authorization: "Tech Lead (Tier 1)"
      constraints:
        - "Production incident P0/P1 only"
        - "Hotfix branch only (no feature branches)"
        - "Auto-reverts in 24 hours if not properly approved"
        - "Post-incident review MANDATORY within 24 hours"

      requirements:
        reason_required: true
        incident_ticket_required: true
        rollback_plan_required: true

  # Eligibility Criteria
  eligibility:
    allowed_severities: ["P0", "P1"]

    p0_definition: |
      Production completely down. Revenue impact >$10K/hour.
      Examples:
      - Authentication service down (all users locked out)
      - Payment processing broken (can't accept payments)
      - Database corruption (data loss risk)

    p1_definition: |
      Critical functionality broken. Major user impact.
      Examples:
      - Security vulnerability actively exploited
      - Data breach in progress
      - Core feature unavailable (50%+ users affected)

    allowed_branches:
      - "hotfix/**"
      - "emergency/**"
      - "incident/**"

    disallowed_branches:
      - "feature/**"
      - "enhancement/**"
      - "refactor/**"
      - "main"
      - "develop"

  # Audit Trail (MANDATORY)
  audit:
    logged: true
    immutable: true
    retention_period: "7 years"

    logged_fields:
      - "break_glass_id"
      - "initiated_by"
      - "approved_by"
      - "pr_number"
      - "branch"
      - "severity"
      - "reason"
      - "incident_ticket"
      - "rollback_plan"
      - "timestamp_initiated"
      - "timestamp_approved"
      - "timestamp_merged"
      - "governance_violations_bypassed"

    notifications:
      immediate:
        - target: "CEO"
          method: "slack"
          message: "🔴 BREAK GLASS ACTIVATED: {reason}"
        - target: "CTO"
          method: "slack"
          message: "🔴 BREAK GLASS ACTIVATED: {reason}"
        - target: "All Tech Leads"
          method: "slack_channel"
          channel: "#sdlc-governance"

      post_incident:
        - target: "Leadership Team"
          method: "email"
          subject: "Break Glass Post-Incident Report: {break_glass_id}"
          attachment: "post-incident-report.pdf"

  # Post-Incident Review (MANDATORY)
  post_incident_review:
    required: true
    deadline: "24 hours after merge"

    participants:
      - "CEO"
      - "CTO"
      - "Tech Lead who initiated break glass"
      - "Developer who created PR"

    review_questions:
      - "Was break glass justified? (P0/P1 severity?)"
      - "Was normal governance attempted first?"
      - "Was CEO approval attempted?"
      - "What governance checks were bypassed?"
      - "Did the hotfix resolve the incident?"
      - "Were there any side effects?"
      - "How can we prevent this in the future?"

    output:
      document: "docs/post-mortems/{break_glass_id}-post-mortem.md"
      sections:
        - "Incident Timeline"
        - "Break Glass Justification"
        - "Governance Bypassed"
        - "Impact Assessment"
        - "Lessons Learned"
        - "Action Items"

    consequences_if_not_completed:
      - "Tech Lead loses break glass authority"
      - "Developer account flagged"
      - "Escalation to CEO"

  # Auto-Revert (Safety Mechanism)
  auto_revert:
    enabled: true
    trigger_condition: "24 hours elapsed AND no post-incident review"

    revert_process:
      - "Automatically create revert commit"
      - "Create PR to revert the hotfix"
      - "Notify Tech Lead and CEO"
      - "Block future break glass from same user until review complete"

    notification:
      target: "Tech Lead"
      message: |
        ⚠️ AUTO-REVERT TRIGGERED
        Break Glass ID: {break_glass_id}
        Original PR: {pr_number}
        Reason: 24-hour post-incident review not completed

        Your break glass authority is SUSPENDED until you complete:
        docs/post-mortems/{break_glass_id}-post-mortem.md

        Revert PR: {revert_pr_number}

  # UI/UX Configuration
  ui:
    button_color: "red"
    button_text: "🔴 BREAK GLASS - EMERGENCY BYPASS"
    button_location: "PR governance check failed panel"

    confirmation_dialog:
      title: "⚠️ BREAK GLASS CONFIRMATION"
      message: |
        You are about to bypass governance controls.

        This action will:
        - Allow merge without full compliance
        - Notify CEO/CTO immediately
        - Require post-incident review within 24 hours
        - Auto-revert if review not completed
        - Log all activity in immutable audit trail

        Break Glass is for EMERGENCIES ONLY.

        Are you experiencing a production P0/P1 incident?

      fields:
        - name: "severity"
          type: "dropdown"
          options: ["P0 - Production Down", "P1 - Critical Functionality Broken"]
          required: true

        - name: "reason"
          type: "textarea"
          placeholder: "Describe the production incident in detail..."
          min_length: 50
          required: true

        - name: "incident_ticket"
          type: "text"
          placeholder: "JIRA/Linear ticket ID (e.g., INC-1234)"
          required: true

        - name: "rollback_plan"
          type: "textarea"
          placeholder: "How will you rollback if this hotfix makes things worse?"
          min_length: 100
          required: true

        - name: "confirmation"
          type: "checkbox"
          label: "I confirm this is a P0/P1 production incident and normal governance cannot be completed in time."
          required: true

      buttons:
        cancel:
          text: "Cancel"
          style: "secondary"
          action: "close_dialog"

        confirm:
          text: "🔴 ACTIVATE BREAK GLASS"
          style: "danger"
          action: "initiate_break_glass"
          disabled_until: "all_fields_valid"

  # Monitoring and Alerts
  monitoring:
    track_break_glass_usage: true

    metrics:
      - "governance.break_glass.initiated.total"
      - "governance.break_glass.approved.total"
      - "governance.break_glass.reverted.total"
      - "governance.break_glass.review_completion_time.seconds"

    alerts:
      break_glass_activated:
        severity: "critical"
        notification: "immediate"
        targets: ["CEO", "CTO", "Tech Leads"]

      break_glass_used_twice_in_week:
        severity: "warning"
        message: "Break Glass used {count} times in 7 days. System issue?"

      post_incident_review_overdue:
        severity: "high"
        trigger: "24 hours elapsed, no review"
        message: "Break Glass {break_glass_id} review overdue. Auto-revert triggered."

  # Abuse Prevention
  abuse_prevention:
    rate_limiting:
      max_per_user_per_week: 2
      max_per_team_per_week: 5

    suspicious_patterns:
      - pattern: "Same user >3 break glass in 30 days"
        action: "Suspend break glass authority, require CTO review"

      - pattern: "Break glass on non-hotfix branch"
        action: "Automatic rejection, flag user account"

      - pattern: "Break glass with reason <50 chars"
        action: "Require more detailed reason"

      - pattern: "P1 incident but no urgency signals (late night, weekend)"
        action: "Additional approval required"

  # Historical Data (Example)
  examples:
    justified_break_glass:
      - break_glass_id: "BG-001"
        date: "2025-12-15"
        severity: "P0"
        reason: "Auth service down, 10K users locked out, revenue loss $50K/hour"
        outcome: "Hotfix deployed in 15 minutes, incident resolved, post-mortem completed"
        verdict: "Justified"

    unjustified_break_glass:
      - break_glass_id: "BG-002"
        date: "2025-11-03"
        severity: "P1 (claimed)"
        reason: "Feature request from CEO, deadline tomorrow"
        outcome: "Not a production incident, user suspended for 30 days"
        verdict: "Abuse - Not an incident"

# Configuration Validation
validation:
  test_break_glass_workflow: true
  test_auto_revert: true
  test_notification_delivery: true

  test_cases:
    - scenario: "P0 incident, CEO unavailable"
      expected: "Break glass approved after 15 min escalation"
    - scenario: "P1 incident on feature branch"
      expected: "Break glass rejected, not a hotfix branch"
    - scenario: "Post-mortem not completed in 24h"
      expected: "Auto-revert triggered, user suspended"
