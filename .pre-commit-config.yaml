# =========================================================================
# Pre-commit Hook Configuration
# SDLC Orchestrator - Sprint 133
#
# Purpose: Enforce code quality, security, and evidence validation
# Framework: SDLC 6.0.0 Evidence-Based Validation (SPEC-0016)
#
# Hooks:
# 1. Code formatting (black, prettier)
# 2. Linting (ruff, eslint)
# 3. Security scanning (bandit)
# 4. Evidence validation (sdlcctl)
#
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# =========================================================================

repos:
  # =========================================================================
  # Python: Code Formatting & Linting
  # =========================================================================
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Format Python code (black)
        language_version: python3.11
        files: ^backend/.*\.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        name: Lint Python code (ruff)
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/.*\.py$

  # =========================================================================
  # TypeScript/JavaScript: Code Formatting & Linting
  # =========================================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Format TypeScript/JavaScript (prettier)
        files: \.(ts|tsx|js|jsx|json|md|yaml|yml)$
        exclude: ^(backend/|\.github/|docs/.*\.md$)

  # =========================================================================
  # Security: Python Security Scanning
  # =========================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Security scan Python (bandit)
        args: [-c, backend/pyproject.toml]
        files: ^backend/app/.*\.py$
        exclude: ^backend/tests/

  # =========================================================================
  # SDLC 6.0.0: Evidence Validation (SPEC-0016) ⭐ NEW
  # =========================================================================
  - repo: local
    hooks:
      - id: evidence-validation
        name: Validate Implementation Evidence (SPEC-0016)
        entry: bash -c 'cd backend/sdlcctl && python -m sdlcctl.cli evidence validate --fail-on-error'
        language: system
        types: [json]
        files: 'docs/.*-evidence\.json$'
        pass_filenames: false
        verbose: true

      - id: evidence-schema-validation
        name: Validate Evidence JSON Schema
        entry: bash -c 'cd backend/sdlcctl && python -c "import json, jsonschema; jsonschema.validate(json.load(open(\"$@\")), json.load(open(\"sdlcctl/schemas/spec-evidence-schema.json\")))"'
        language: system
        types: [json]
        files: 'docs/.*-evidence\.json$'

  # =========================================================================
  # Git: General Code Quality Checks
  # =========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        exclude: ^docs/.*\.md$

      - id: end-of-file-fixer
        name: Fix missing newline at end of file

      - id: check-yaml
        name: Validate YAML syntax
        args: [--allow-multiple-documents]

      - id: check-json
        name: Validate JSON syntax

      - id: check-added-large-files
        name: Prevent large files (>500KB)
        args: [--maxkb=500]

      - id: detect-private-key
        name: Detect private keys

      - id: check-merge-conflict
        name: Detect merge conflict markers

      - id: check-case-conflict
        name: Check for case conflicts

      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [--fix=lf]

  # =========================================================================
  # Python: Import Sorting
  # =========================================================================
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Python imports (isort)
        args: [--profile, black]
        files: ^backend/.*\.py$

  # =========================================================================
  # Markdown: Documentation Linting
  # =========================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        name: Lint Markdown documentation
        args: [--fix, --disable, MD013, MD033, MD041]
        files: ^docs/.*\.md$

# =========================================================================
# Pre-commit Configuration
# =========================================================================
default_stages: [commit]
fail_fast: false
minimum_pre_commit_version: 3.0.0

# CI configuration
ci:
  autofix_prs: true
  autofix_commit_msg: 'chore: auto-fix pre-commit hooks'
  autoupdate_schedule: monthly
  skip: [evidence-validation, evidence-schema-validation]  # Skip in CI (runs in GitHub Actions instead)
