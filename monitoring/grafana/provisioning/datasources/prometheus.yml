# ============================================================================
# GRAFANA DATASOURCE PROVISIONING - Prometheus
# Week 5 Day 2 - Performance & Load Testing
#
# Purpose:
# - Auto-configure Prometheus as Grafana datasource
# - No manual setup required in Grafana UI
# ============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '15s'
      queryTimeout: '60s'
      httpMethod: 'POST'
